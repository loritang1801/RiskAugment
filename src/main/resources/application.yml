spring:
  application:
    name: risk-control-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # SQL initialization
  sql:
    init:
      mode: never

  # Redis Configuration
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

# Logging Configuration
logging:
  level:
    root: INFO
    com.riskcontrol: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/risk-control-platform.log
    max-size: 10MB
    max-history: 30

# Swagger/OpenAPI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

app:
  name: Risk Control Decision Enhancement Platform
  version: 1.0.0
  jwt:
    secret: ${APP_JWT_SECRET:replace-this-with-a-long-random-secret-key-at-least-32-chars}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:8}

# AI service configuration used by Java backend client
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5000}
    timeout: ${AI_SERVICE_TIMEOUT:120000}
    fail-on-error: ${AI_SERVICE_FAIL_ON_ERROR:true}
