spring:
  datasource:
    url: jdbc:h2:mem:risk_control_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: never
  redis:
    host: localhost
    port: 6379
    timeout: 100ms

ai:
  service:
    url: http://localhost:5000
    timeout: 5000
    fail-on-error: false
